<h1>Interactive Dashboard</h1>

<!-- Dropdown -->
<div class="section">
  <label>Select Category:</label>

  <select
    [(ngModel)]="selectedCategory"
    (change)="updateDashboard()">

    <option>Users</option>
    <option>Sales</option>
    <option>Orders</option>

  </select>
</div>

<br>

<!-- Slider -->
<div class="section">
  <label>Range:</label>

  <input
    type="range"
    min="0"
    max="100"
    [(ngModel)]="rangeValue">

  <p>Selected Range: {{ rangeValue }}</p>
</div>

<br>

<!-- Input -->
<div class="section">
  <label>Search:</label>

  <input
    type="text"
    [(ngModel)]="searchText"
    placeholder="Enter text">

  <p>Search Value: {{ searchText }}</p>
</div>

<hr>

<h2>{{ message }}</h2>
