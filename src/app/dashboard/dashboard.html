<h1>Interactive Dashboard</h1>

<!-- Dropdown -->
<div class="section">
  <label>Select Category:</label>

  <select [(ngModel)]="selectedCategory">
    <option *ngFor="let category of categories">
      {{ category }}
    </option>
  </select>

  <p>Selected: {{ selectedCategory }}</p>
</div>

<!-- Slider -->
<div class="section">
  <label>Range:</label>

  <input
    type="range"
    min="0"
    max="100"
    [(ngModel)]="rangeValue">

  <p>Value: {{ rangeValue }}</p>
</div>

<!-- Input Field -->
<div class="section">
  <label>Search:</label>

  <input
    type="text"
    placeholder="Enter name"
    [(ngModel)]="searchText">

  <p>You entered: {{ searchText }}</p>
</div>

<hr>

<h2>User Data</h2>

<table>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>City</th>
  </tr>

  <tr *ngFor="let user of users">
    <td>{{ user.id }}</td>
    <td>{{ user.name }}</td>
    <td>{{ user.city }}</td>
  </tr>
</table>
